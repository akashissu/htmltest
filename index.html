<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Weather UI</title>
  <style>
    :root {
      --bg-top: #dff0ff;
      --bg-bottom: #f5f9ff;
      --panel: #ffffff;
      --panel-soft: #f7faff;
      --border: #d7e3f3;
      --text: #1f2c3d;
      --muted: #5f6f86;
      --accent: #3b82f6;
      --sun: #f5b942;
      --cloud: #8fa3bf;
      --rain: #4f8edc;
      --radius-xl: 22px;
      --radius-md: 14px;
      --shadow: 0 18px 40px rgba(31, 44, 61, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .weather-app {
      width: min(960px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .weather-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
    }

    .weather-header h1 {
      margin: 0;
      font-size: 1.1rem;
    }

    .search {
      display: flex;
      gap: 0.5rem;
      width: min(420px, 100%);
    }

    .search input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.65rem 0.75rem;
      font: inherit;
      min-width: 0;
    }

    .search button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      padding: 0.65rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .current {
      padding: 1rem;
      background: linear-gradient(180deg, #ffffff 0%, var(--panel-soft) 100%);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .location {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .temp {
      margin: 0.25rem 0 0;
      font-size: clamp(2.2rem, 6vw, 3.3rem);
      line-height: 1;
    }

    .condition {
      margin: 0.35rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .weather-icon {
      font-size: 3rem;
      line-height: 1;
      text-align: right;
    }

    .forecast {
      padding: 1rem;
    }

    .forecast h2 {
      margin: 0 0 0.75rem;
      font-size: 1rem;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0.65rem;
    }

    .day-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.7rem;
      text-align: center;
    }

    .day {
      margin: 0;
      font-weight: 700;
      font-size: 0.88rem;
    }

    .icon {
      margin: 0.35rem 0;
      font-size: 1.25rem;
    }

    .temps {
      margin: 0;
      font-size: 0.86rem;
      color: var(--text);
    }

    .desc {
      margin: 0.2rem 0 0;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .sun { color: var(--sun); }
    .cloud { color: var(--cloud); }
    .rain { color: var(--rain); }

    @media (max-width: 760px) {
      .forecast-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .current {
        grid-template-columns: 1fr;
      }

      .weather-icon {
        text-align: left;
      }
    }

    @media (max-width: 420px) {
      .forecast-grid {
        grid-template-columns: 1fr;
      }

      .search {
        flex-direction: column;
      }

      .search button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="weather-app" aria-label="Weather application interface">
    <header class="weather-header">
      <h1>Weather</h1>
      <form class="search" aria-label="Search city weather">
        <input type="search" placeholder="Search city" aria-label="Search city" />
        <button type="button">Search</button>
      </form>
    </header>

    <section class="current" aria-label="Current weather">
      <div>
        <p class="location">San Francisco, CA</p>
        <p class="temp">24°C</p>
        <p class="condition">Sunny with light breeze · H:26° L:18°</p>
      </div>
      <div class="weather-icon sun" aria-hidden="true">☀️</div>
    </section>

    <section class="forecast" aria-label="5 day forecast">
      <h2>5-Day Forecast</h2>
      <div class="forecast-grid">
        <article class="day-card">
          <p class="day">Mon</p>
          <p class="icon sun" aria-hidden="true">☀️</p>
          <p class="temps">25° / 18°</p>
          <p class="desc">Sunny</p>
        </article>
        <article class="day-card">
          <p class="day">Tue</p>
          <p class="icon cloud" aria-hidden="true">☁️</p>
          <p class="temps">23° / 17°</p>
          <p class="desc">Cloudy</p>
        </article>
        <article class="day-card">
          <p class="day">Wed</p>
          <p class="icon rain" aria-hidden="true">🌧️</p>
          <p class="temps">21° / 16°</p>
          <p class="desc">Rainy</p>
        </article>
        <article class="day-card">
          <p class="day">Thu</p>
          <p class="icon cloud" aria-hidden="true">⛅</p>
          <p class="temps">24° / 18°</p>
          <p class="desc">Partly cloudy</p>
        </article>
        <article class="day-card">
          <p class="day">Fri</p>
          <p class="icon sun" aria-hidden="true">☀️</p>
          <p class="temps">26° / 19°</p>
          <p class="desc">Sunny</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
