<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate Listings</title>
  <style>
    :root {
      --bg-main: #f5f7fa;
      --bg-card: #ffffff;
      --text-main: #333333;
      --text-muted: #666666;
      --accent: #4a90e2;
      --border: #dddddd;
      --radius-lg: 12px;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text-main);
      background: var(--bg-main);
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .property-listing {
      width: min(1100px, 100%);
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      place-items: center;
    }

    .property-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      width: 100%;
      display: grid;
      gap: 0.75rem;
      padding: 1rem;
      transition: box-shadow 180ms ease, transform 180ms ease;
    }

    .property-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .property-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }

    .price {
      margin: 0;
      font-size: 1.25rem;
      font-weight: bold;
      color: var(--accent);
    }

    .location {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .feature-details {
      display: flex;
      gap: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="property-listing" aria-label="Real Estate Property Listings">
    <article class="property-card">
      <img src="https://via.placeholder.com/280" alt="Luxury Apartment" class="property-image">
      <h2 class="price">$1,200,000</h2>
      <p class="location">Central Park, New York</p>
      <div class="feature-details">
        <span class="bedrooms">3 bedrooms</span>
        <span class="bathrooms">2 bathrooms</span>
      </div>
    </article>

    <article class="property-card">
      <img src="https://via.placeholder.com/280" alt="Modern House" class="property-image">
      <h2 class="price">$850,000</h2>
      <p class="location">Downtown, Seattle</p>
      <div class="feature-details">
        <span class="bedrooms">4 bedrooms</span>
        <span class="bathrooms">3 bathrooms</span>
      </div>
    </article>

    <article class="property-card">
      <img src="https://via.placeholder.com/280" alt="Cozy Cottage" class="property-image">
      <h2 class="price">$620,000</h2>
      <p class="location">Countryside, Vermont</p>
      <div class="feature-details">
        <span class="bedrooms">2 bedrooms</span>
        <span class="bathrooms">1 bathroom</span>
      </div>
    </article>
  </main>
</body>
</html>
