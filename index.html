<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Page</title>
  <style>
    :root {
      --bg-main: #f9fbfd;
      --bg-card: #ffffff;
      --text-main: #333333;
      --text-muted: #777777;
      --accent: #2b8a3e;
      --accent-hover: #237730;
      --border: #dddddd;
      --radius-lg: 12px;
      --shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: var(--text-main);
      background: var(--bg-main);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .product-page {
      width: 100%;
      max-width: 900px;
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .image-preview {
      width: 100%;
      height: 400px;
      background-size: cover;
      background-position: center;
    }

    .product-info {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .product-name {
      margin: 0;
      font-size: 1.8rem;
    }

    .price {
      margin: 0.5rem 0;
      font-size: 1.25rem;
      color: var(--accent);
    }

    .description {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .add-to-cart {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: var(--radius-lg);
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .add-to-cart:hover {
      background: var(--accent-hover);
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    @media (min-width: 600px) {
      .product-page {
        flex-direction: row;
      }

      .image-preview {
        width: 50%;
        height: auto;
      }

      .product-info {
        width: 50%;
      }
    }
  </style>
</head>
<body>
  <main class="product-page">
    <div class="image-preview" style="background-image: url('https://via.placeholder.com/400')" aria-label="Luxury Watch"></div>
    <article class="product-info">
      <h1 class="product-name">Luxury Watch</h1>
      <p class="price">$250</p>
      <p class="description">Elegant luxury watch with precision craftsmanship, featuring a stainless steel case, sapphire crystal, and automatic movement. Waterproof up to 50 meters with a 2-year international warranty. Perfect for both business and casual wear.</p>
      <button class="add-to-cart">Add to Cart</button>
    </article>
  </main>
</body>
</html>
