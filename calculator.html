<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Calculator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      background: radial-gradient(circle at top, #1f2937, #020617 70%);
      color: #fff;
    }
    .calculator {
      width: min(92vw, 390px);
      padding: 1.5rem;
      border-radius: 28px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(20px);
      box-shadow: 0 28px 90px rgba(0,0,0,0.45);
    }
    .display {
      width: 100%;
      height: 84px;
      margin-bottom: 1rem;
      border: none;
      border-radius: 20px;
      padding: 1rem;
      background: rgba(15,23,42,0.78);
      color: #fff;
      text-align: right;
      font-size: 2rem;
    }
    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.85rem;
    }
    button {
      border: none;
      border-radius: 18px;
      padding: 1rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 24px rgba(0,0,0,0.18);
      transition: transform .18s ease, background .18s ease;
    }
    button:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.16);
    }
    .operator { background: rgba(59,130,246,0.28); }
    .operator:hover { background: rgba(59,130,246,0.42); }
    .equal { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .equal:hover { background: linear-gradient(135deg, #34d399, #22c55e); }
    .clear { background: rgba(239,68,68,0.28); }
    .clear:hover { background: rgba(239,68,68,0.42); }
    .span-2 { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <input id="display" class="display" type="text" value="0" readonly>
    <div class="keys">
      <button class="clear span-2" data-action="clear">Clear</button>
      <button class="operator" data-value="/">÷</button>
      <button class="operator" data-value="*">×</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="operator" data-value="-">−</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="operator" data-value="+">+</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="equal" data-action="calculate">=</button>

      <button class="span-2" data-value="0">0</button>
      <button data-value=".">.</button>
      <button data-action="backspace">⌫</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    const buttons = document.querySelectorAll('button');

    function setDisplay(value) {
      display.value = value || '0';
    }

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        const { value, action } = button.dataset;

        if (action === 'clear') {
          setDisplay('0');
          return;
        }

        if (action === 'backspace') {
          setDisplay(display.value.length > 1 ? display.value.slice(0, -1) : '0');
          return;
        }

        if (action === 'calculate') {
          try {
            const result = Function(`return (${display.value})`)();
            setDisplay(String(result));
          } catch {
            setDisplay('Error');
          }
          return;
        }

        if (display.value === '0' || display.value === 'Error') {
          setDisplay(value);
        } else {
          setDisplay(display.value + value);
        }
      });
    });
  </script>
</body>
</html>
